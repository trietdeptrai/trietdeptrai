<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800" role="img" aria-labelledby="title desc">
  <title id="title">Triet Nguyen — Learning Lab</title>
  <desc id="desc">Triet Nguyen makes things that help people learn better. He is an educator, marketer, and product builder focused on education tools and agent harnesses.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1" />
    </pattern>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171c24" />
      <stop offset="1" stop-color="#11161d" />
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="#0d1117" />
  <rect x="20" y="20" width="560" height="760" rx="28" fill="url(#surface)" stroke="#303844" stroke-width="2" />
  <rect x="20" y="20" width="560" height="760" rx="28" fill="url(#grid)" />

  <rect x="52" y="54" width="18" height="18" rx="5" fill="#f2b84b" />
  <text x="86" y="70" fill="#7d8796" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" font-weight="600" letter-spacing="4">LEARNING LAB</text>
  <circle cx="462" cy="63" r="7" fill="#3fb950" />
  <text x="480" y="69" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="700" letter-spacing="2">MAKING</text>

  <text x="52" y="154" fill="#f4f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="52" font-weight="750" letter-spacing="-1.5">Triet Nguyen</text>
  <rect x="54" y="178" width="108" height="5" rx="2.5" fill="#f2b84b" />
  <text x="52" y="226" fill="#a7b0bd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">making things that help people</text>
  <text x="52" y="256" fill="#a7b0bd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">learn better.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="52" y="326" fill="#737e8e" font-size="16" letter-spacing="2">IDENTITY</text>
    <text x="52" y="358" fill="#e6edf3" font-size="20">educator · marketer · product builder</text>

    <text x="52" y="422" fill="#737e8e" font-size="16" letter-spacing="2">FOCUS</text>
    <text x="52" y="454" fill="#e6edf3" font-size="20">education tools · agent harnesses</text>

    <text x="52" y="518" fill="#737e8e" font-size="16" letter-spacing="2">EDUCATION</text>
    <text x="52" y="550" fill="#e6edf3" font-size="20">Marketing Management @ Staffordshire</text>
    <text x="52" y="580" fill="#e6edf3" font-size="20">University</text>

    <text x="52" y="644" fill="#737e8e" font-size="16" letter-spacing="2">STACK</text>
    <text x="52" y="676" fill="#e6edf3" font-size="20">TypeScript · Python · React · AI agents</text>
  </g>

  <line x1="52" y1="718" x2="548" y2="718" stroke="#303844" />
  <text x="52" y="753" fill="#f2b84b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700">›</text>
  <text x="78" y="753" fill="#d7dde5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">learning by making, then making learning better</text>
