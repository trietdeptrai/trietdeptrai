<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Triet Nguyen — Learning Lab</title>
  <desc id="desc">Triet Nguyen makes things that help people learn better. He is an educator, marketer, and product builder focused on education tools and agent harnesses.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.025" stroke-width="1" />
    </pattern>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171c24" />
      <stop offset="1" stop-color="#11161d" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="650" fill="#0d1117" />
  <rect x="34" y="34" width="1132" height="582" rx="34" fill="url(#surface)" stroke="#303844" stroke-width="2" filter="url(#shadow)" />
  <rect x="34" y="34" width="1132" height="582" rx="34" fill="url(#grid)" />

  <rect x="82" y="78" width="22" height="22" rx="6" fill="#f2b84b" />
  <text x="124" y="96" fill="#7d8796" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="600" letter-spacing="6">LEARNING LAB</text>

  <circle cx="962" cy="89" r="8" fill="#3fb950" />
  <circle cx="962" cy="89" r="14" fill="none" stroke="#3fb950" stroke-opacity="0.35" stroke-width="2" />
  <text x="986" y="96" fill="#3fb950" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="700" letter-spacing="4">MAKING</text>

  <text x="82" y="198" fill="#f4f7fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="750" letter-spacing="-2">Triet Nguyen</text>
  <rect x="84" y="224" width="134" height="5" rx="2.5" fill="#f2b84b" />
  <text x="82" y="274" fill="#a7b0bd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="23">making things that help people learn better.</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21">
    <text x="82" y="352" fill="#737e8e">identity</text>
    <text x="286" y="352" fill="#e6edf3">educator · marketer · product builder</text>

    <text x="82" y="406" fill="#737e8e">focus</text>
    <text x="286" y="406" fill="#e6edf3">education tools · agent harnesses</text>

    <text x="82" y="460" fill="#737e8e">education</text>
    <text x="286" y="460" fill="#e6edf3">Marketing management @ Staffordshire University </text>

    <text x="82" y="514" fill="#737e8e">stack</text>
    <text x="286" y="514" fill="#e6edf3">TypeScript · Python · React · AI agents</text>
  </g>

  <line x1="82" y1="558" x2="1118" y2="558" stroke="#303844" />
  <text x="82" y="590" fill="#f2b84b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700">›</text>
  <text x="112" y="590" fill="#d7dde5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">learning by making, then making learning better</text>
</svg>
